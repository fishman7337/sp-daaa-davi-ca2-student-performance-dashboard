services:
  - type: web
    name: student-performance-intelligence
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 1 --threads 2 --timeout 180 --graceful-timeout 180
    envVars:
      - key: DAVI_PROCESSED_DATA_DIR
        value: data/processed
